<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Danh mục & Bộ sưu tập · Thanh Vân Admin</title>
<link rel="stylesheet" href="assets/app.css">
<script src="assets/admin.js"></script>
</head>
<body class="admin">
  <aside class="side" data-side="categories"></aside>
  <div class="main">
    <header class="topnav" data-crumb="<b>Danh mục & Bộ sưu tập</b>"></header>
    <div class="content">
      <div class="page-head"><div><h1>Danh mục & Bộ sưu tập</h1><p>Phân loại sản phẩm</p></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

        <div class="card">
          <div class="card-head"><h3>Danh mục</h3><button class="btn btn-ghost btn-sm">+ Thêm</button></div>
          <div class="card-pad" style="display:flex;gap:8px;margin-bottom:4px"><input class="ainput" placeholder="Tên danh mục mới"><button class="btn btn-gold btn-sm">Lưu</button></div>
          <table class="table">
            <tbody>
              <tr><td class="cellmain">Nhẫn</td><td class="muted">nhan</td><td class="muted">18 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
              <tr><td class="cellmain">Dây chuyền</td><td class="muted">day-chuyen</td><td class="muted">12 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
              <tr><td class="cellmain">Vòng tay</td><td class="muted">vong-tay</td><td class="muted">8 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
              <tr><td class="cellmain">Bông tai</td><td class="muted">bong-tai</td><td class="muted">4 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
            </tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-head"><h3>Bộ sưu tập</h3><button class="btn btn-ghost btn-sm">+ Thêm</button></div>
          <div class="card-pad" style="display:flex;gap:8px;margin-bottom:4px"><input class="ainput" placeholder="Tên bộ sưu tập mới"><button class="btn btn-gold btn-sm">Lưu</button></div>
          <table class="table">
            <tbody>
              <tr><td class="cellmain">Xuân 2026</td><td class="muted">xuan-2026</td><td class="muted">10 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
              <tr><td class="cellmain">Đính hôn</td><td class="muted">dinh-hon</td><td class="muted">14 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
              <tr><td class="cellmain">Cưới</td><td class="muted">cuoi</td><td class="muted">9 SP</td><td style="text-align:right"><button class="btn btn-ghost btn-sm">Sửa</button></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</html>

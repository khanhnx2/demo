<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>crypto.minios.top UI/UX Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#screen-title">Skip to main content</a>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Prototype navigation">
        <div class="brand" aria-label="crypto.minios.top">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M12 3 4 7v10l8 4 8-4V7l-8-4Zm0 4 4 2-4 2-4-2 4-2Zm-5 5 4 2v4l-4-2v-4Zm10 0v4l-4 2v-4l4-2Z"/></svg>
          </span>
          <span><strong>crypto</strong><small>minios.top</small></span>
        </div>
        <nav id="phase-nav" class="phase-nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="icon-button" id="menu-button" type="button" aria-label="Toggle navigation">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
          </button>
          <div>
            <p class="eyebrow">BNB Smart Chain Payment Gateway</p>
            <h1 id="screen-title">Merchant Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <button class="button ghost" id="theme-toggle" type="button">Dark mode</button>
            <button class="button secondary" type="button">API docs</button>
          </div>
        </header>

        <section id="screen" class="screen" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite">Copied</div>

    <dialog id="confirm-dialog" class="dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>Confirm sensitive action</h2>
          <button class="icon-button" value="cancel" aria-label="Close dialog">
            <svg viewBox="0 0 24 24" focusable="false"><path d="m6 6 12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <p id="dialog-copy">This action requires Turnstile verification and explicit confirmation.</p>
        <label class="check-row">
          <input type="checkbox">
          <span>I understand the operational impact.</span>
        </label>
        <div class="turnstile">Cloudflare Turnstile placeholder</div>
        <div class="dialog-actions">
          <button class="button secondary" value="cancel">Cancel</button>
          <button class="button danger" value="confirm">Confirm</button>
        </div>
      </form>
    </dialog>

    <script src="screens.js"></script>
    <script src="app.js"></script>
  </body>
</html>
